<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power BI Student Checklist</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            text-align: center;
            color: white;
            padding: 20px;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 20px auto;
            border: 4px solid #FFD700;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            animation: pulse 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.5));
            }
            50% {
                transform: scale(1.05);
                filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8));
            }
        }
        
        .btn {
            display: inline-block;
            padding: 16px 40px;
            margin: 20px;
            background-color: #FFD700;
            color: #764ba2;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        p {
            font-size: 1.2em;
            margin: 20px 0;
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="PowerBI_Superhero.png" alt="Power BI Superhero" class="logo">
        <h1>📊 Power BI Student Checklist</h1>
        <p>Master Power BI with our comprehensive learning checklist!</p>
        <p>Track your progress as you learn core concepts, visualizations, advanced topics, and more.</p>
        <a href="power_bi_checklist.html" class="btn">📚 Start Learning</a>
    </div>
</body>
</html>
