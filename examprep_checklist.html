<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power BI Exam Checklist</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f4; color: #1a1a1a; padding: 2rem 1rem; }
  .wrap { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 1rem; }
  .progress-bar { width: 100%; height: 8px; background: #e5e5e5; border-radius: 99px; overflow: hidden; margin-bottom: .5rem; }
  .progress-fill { height: 100%; background: #1D9E75; border-radius: 99px; transition: width .3s ease; width: 0%; }
  .completion-text { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .section { margin-bottom: 1.25rem; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; background: #fff; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1rem; background: #f9f9f8; cursor: pointer; user-select: none; }
  .section-title { font-size: 15px; font-weight: 500; color: #1a1a1a; }
  .section-pct { font-weight: 400; font-size: 13px; color: #888; }
  .section-meta { display: flex; align-items: center; gap: 8px; }
  .section-count { font-size: 12px; color: #888; }
  .chevron { font-size: 11px; color: #888; transition: transform .2s; display: inline-block; }
  .chevron.open { transform: rotate(180deg); }
  .section-body { display: block; }
  .subsection { padding: .75rem 1rem; border-top: 1px solid #ebebeb; }
  .subsection-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .5rem; }
  .checklist { list-style: none; }
  .checklist li { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
  .checklist li:last-child { border-bottom: none; }
  .checklist li label { font-size: 14px; color: #1a1a1a; line-height: 1.5; cursor: pointer; flex: 1; }
  .checklist li input[type=checkbox] { margin-top: 3px; flex-shrink: 0; cursor: pointer; accent-color: #1D9E75; width: 15px; height: 15px; }
  .checklist li.checked label { color: #aaa; text-decoration: line-through; }
  .reset-btn { margin-top: .75rem; padding: 8px 16px; font-size: 13px; cursor: pointer; background: transparent; border: 1px solid #ccc; border-radius: 8px; color: #666; }
  .reset-btn:hover { background: #f5f5f5; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #e5e5e5; }
    .section { background: #252525; border-color: #333; }
    .section-header { background: #2e2e2e; }
    .section-title { color: #e5e5e5; }
    .subsection { border-top-color: #333; }
    .checklist li { border-bottom-color: #2e2e2e; }
    .checklist li label { color: #e5e5e5; }
    .checklist li.checked label { color: #555; }
    .progress-bar { background: #333; }
    .reset-btn { border-color: #444; color: #aaa; }
    .reset-btn:hover { background: #2e2e2e; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Power BI Exam Checklist</h1>
  <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
  <div class="completion-text" id="pText">0% complete</div>
  <div id="sectionsRoot"></div>
  <button class="reset-btn" id="resetBtn">Reset progress</button>
</div>

<script>
const DATA = [
  {
    id:"s1", label:"Section 1: Prepare the data", pct:"25–30%",
    groups:[
      {label:"Get or connect to data", items:[
        "Identify and connect to data sources or a shared semantic model",
        "Change data source settings, including credentials and privacy levels",
        "Choose between DirectQuery and Import",
        "Create and modify parameters"
      ]},
      {label:"Profile and clean the data", items:[
        "Evaluate data, including data statistics and column properties",
        "Resolve inconsistencies, unexpected or null values, and data quality issues",
        "Resolve data import errors"
      ]},
      {label:"Transform and load the data", items:[
        "Select appropriate column data types",
        "Create and transform columns",
        "Group and aggregate rows",
        "Pivot, unpivot, and transpose data",
        "Convert semi-structured data to a table",
        "Create fact tables and dimension tables",
        "Identify when to use reference or duplicate queries and the resulting impact",
        "Merge and append queries",
        "Identify and create appropriate keys for relationships",
        "Configure data loading for queries"
      ]}
    ]
  },
  {
    id:"s2", label:"Section 2: Model the data", pct:"25–30%",
    groups:[
      {label:"Design and implement a data model", items:[
        "Configure table and column properties",
        "Implement role-playing dimensions",
        "Define a relationship's cardinality and cross-filter direction",
        "Create a common date table",
        "Identify use cases for calculated columns and calculated tables"
      ]},
      {label:"Create model calculations using DAX", items:[
        "Create single aggregation measures",
        "Use the CALCULATE function",
        "Implement time intelligence measures",
        "Use basic statistical functions",
        "Create semi-additive measures",
        "Create a measure by using quick measures",
        "Create calculated tables or columns",
        "Create calculation groups"
      ]},
      {label:"Optimize model performance", items:[
        "Improve performance by identifying and removing unnecessary rows and columns",
        "Identify poorly performing measures, relationships, and visuals using Performance Analyzer and DAX query view",
        "Improve performance by reducing granularity"
      ]}
    ]
  },
  {
    id:"s3", label:"Section 3: Visualize and analyze the data", pct:"25–30%",
    groups:[
      {label:"Create reports", items:[
        "Select an appropriate visual",
        "Format and configure visuals",
        "Create a narrative visual with Copilot",
        "Apply and customize a theme",
        "Apply conditional formatting",
        "Apply slicing and filtering",
        "Use Copilot to create a new report page",
        "Use Copilot to suggest content for a new report page",
        "Configure the report page",
        "Choose when to use a paginated report",
        "Create visual calculations using DAX"
      ]},
      {label:"Enhance reports for usability and storytelling", items:[
        "Configure bookmarks",
        "Create custom tooltips",
        "Edit and configure interactions between visuals",
        "Configure navigation for a report",
        "Apply sorting to visuals",
        "Configure sync slicers",
        "Group and layer visuals by using the Selection pane",
        "Configure drill through navigation",
        "Configure export settings",
        "Design reports for mobile devices",
        "Enable personalized visuals in a report",
        "Design and configure Power BI reports for accessibility",
        "Configure automatic page refresh"
      ]},
      {label:"Identify patterns and trends", items:[
        "Use the Analyze feature in Power BI",
        "Use grouping, binning, and clustering",
        "Use AI visuals",
        "Use reference lines, error bars, and forecasting",
        "Detect outliers and anomalies",
        "Use Copilot to summarize the underlying semantic model"
      ]}
    ]
  },
  {
    id:"s4", label:"Section 4: Manage and secure Power BI", pct:"15–20%",
    groups:[
      {label:"Create and manage workspaces and assets", items:[
        "Create and configure a workspace",
        "Configure and update a workspace app",
        "Publish, import, or update items in a workspace",
        "Create dashboards",
        "Choose a distribution method",
        "Configure subscriptions and data alerts",
        "Promote or certify Power BI content",
        "Identify when a gateway is required",
        "Configure a semantic model scheduled refresh"
      ]},
      {label:"Secure and govern Power BI items", items:[
        "Assign workspace roles",
        "Configure item-level access",
        "Configure access to semantic models",
        "Implement row-level security roles",
        "Configure row-level security group membership",
        "Apply sensitivity labels"
      ]}
    ]
  }
];

const STORAGE_KEY = 'pbi_checklist_state';
const state = {};
DATA.forEach(s => s.groups.forEach(g => g.items.forEach(item => { state[item] = false; })));

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    Object.keys(saved).forEach(k => { if (k in state) state[k] = saved[k]; });
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function updateProgress() {
  const all = Object.keys(state);
  const done = all.filter(k => state[k]).length;
  const pct = all.length ? Math.round(done / all.length * 100) : 0;
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pText').textContent = pct + '% complete (' + done + ' of ' + all.length + ' items)';
}

function updateSectionCount(sectionEl, sectionData) {
  const items = sectionData.groups.flatMap(g => g.items);
  const done = items.filter(i => state[i]).length;
  sectionEl.querySelector('.section-count').textContent = done + '/' + items.length;
}

function render() {
  const root = document.getElementById('sectionsRoot');
  root.innerHTML = '';
  DATA.forEach(sec => {
    const div = document.createElement('div');
    div.className = 'section';

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `<span class="section-title">${sec.label} <span class="section-pct">(${sec.pct})</span></span><span class="section-meta"><span class="section-count">0/0</span><span class="chevron open">&#9660;</span></span>`;

    const body = document.createElement('div');
    body.className = 'section-body';

    sec.groups.forEach(g => {
      const sub = document.createElement('div');
      sub.className = 'subsection';
      sub.innerHTML = `<div class="subsection-label">${g.label}</div>`;
      const ul = document.createElement('ul');
      ul.className = 'checklist';
      g.items.forEach(item => {
        const li = document.createElement('li');
        if (state[item]) li.classList.add('checked');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = state[item];
        cb.addEventListener('change', () => {
          state[item] = cb.checked;
          li.classList.toggle('checked', cb.checked);
          updateSectionCount(div, sec);
          updateProgress();
          saveState();
        });
        const lbl = document.createElement('label');
        lbl.textContent = item;
        lbl.addEventListener('click', () => { cb.click(); });
        li.appendChild(cb);
        li.appendChild(lbl);
        ul.appendChild(li);
      });
      sub.appendChild(ul);
      body.appendChild(sub);
    });

    header.addEventListener('click', () => {
      const open = body.style.display !== 'none';
      body.style.display = open ? 'none' : 'block';
      header.querySelector('.chevron').classList.toggle('open', !open);
    });

    div.appendChild(header);
    div.appendChild(body);
    root.appendChild(div);
    updateSectionCount(div, sec);
  });
  updateProgress();
}

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset all progress?')) {
    Object.keys(state).forEach(k => state[k] = false);
    saveState();
    render();
  }
});

loadState();
render();
</script>
</body>
</html>
